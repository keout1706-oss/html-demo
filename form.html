<!DOCTYPE html>
<html lang="zh-tw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>表單練習</title>
</head>
<body>
    <form action="" method="get">
        <label for="username">使用者名稱:</label>
        <input required type="text" id="username" name="username">
        <br>
        <label for="age">使用者年齡:</label>
        <input type="number" id="age" name="age">
        <br>
        <label for="email">使用者信箱:</label>
        <input required type="email" id="email" name="email">
        <br>
        <label for="password">使用者密碼:</label>
        <input placeholder="請輸入6~8不重複字元" required type="password" id="password" name="password">
        <br>
        <input type="tel" placeholder="電話號碼">
        <input type="url" placeholder="網址">

        <input type="checkbox" id="agree"> <label for="agree">我同意</label>
        <input type="radio" name="gender" value="male" checked>男
        <input type="radio" name="gender" value="female">女
        <!--殊型-->
        <input type="date"><!--⽇期選擇器-->
        <input type="range" min="0" max="100" value="80"> <!--滑桿-->
        <input type="color"> <!--顏色選擇器-->
        <input type="file"> <!--檔案上傳-->
         




        <button type="submit">註冊</button>



    </form>    
</body>
</html>
